<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010306"/>
      <stop offset="50%" stop-color="#030d18"/>
      <stop offset="100%" stop-color="#010306"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/><feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fluidGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/></feMerge>
    </filter>
    <radialGradient id="nebula1" cx="15%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="85%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#22d3ee" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <clipPath id="clip"><rect width="900" height="280" rx="12"/></clipPath>
    <clipPath id="glitchClip1"><rect x="0" y="128" width="900" height="22"/></clipPath>
    <clipPath id="glitchClip2"><rect x="0" y="155" width="900" height="18"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="900" height="280" fill="url(#bg)"/>
    <rect width="900" height="280" fill="url(#nebula1)">
      <animate attributeName="opacity" values="0.3;0.8;0.4;0.9;0.3" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </rect>
    <rect width="900" height="280" fill="url(#nebula2)">
      <animate attributeName="opacity" values="0.5;1;0.3;0.8;0.5" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </rect>
    <rect width="900" height="280" fill="url(#nebula3)">
      <animate attributeName="opacity" values="0.2;0.7;0.3;0.6;0.2" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </rect>

    <!-- Scanline overlay -->
    <rect width="900" height="280" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.03"
          style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(34,211,238,0.03) 2px, rgba(34,211,238,0.03) 4px)"/>

    <!-- Stars -->
    <g opacity="0.7">
      <circle cx="150" cy="50" r="1.2" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
      <circle cx="350" cy="120" r="1.5" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
      <circle cx="550" cy="180" r="1" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
      <circle cx="750" cy="220" r="1.3" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </circle>
      <circle cx="80" cy="200" r="0.9" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="820" cy="90" r="1.1" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="680" cy="40" r="0.8" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="240" r="1" fill="#d2e4ff">
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Fluid Blue Wave Layer -->
    <text x="450" y="163" text-anchor="middle"
          font-family="'Courier New', monospace" font-weight="900" font-size="76" letter-spacing="14"
          fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.3" filter="url(#fluidGlow)">
      RUYYNN
      <animate attributeName="stroke-width" values="3;8;3" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -8,5; 5,-3; 0,0" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.2 0 0.8 1; 0.2 0 0.8 1; 0.2 0 0.8 1"/>
    </text>

    <!-- Secondary Blue Wave -->
    <text x="450" y="163" text-anchor="middle"
          font-family="'Courier New', monospace" font-weight="900" font-size="76" letter-spacing="14"
          fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.2" filter="url(#softGlow)">
      RUYYNN
      <animate attributeName="stroke-width" values="1;4;1" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 6,-4; -4,6; 0,0" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.2 0 0.8 1; 0.2 0 0.8 1; 0.2 0 0.8 1"/>
    </text>

    <!-- Main text -->
    <text x="450" y="163" text-anchor="middle"
          font-family="'Courier New', monospace" font-weight="900" font-size="76" letter-spacing="14"
          fill="white" filter="url(#titleGlow)">
      RUYYNN
      <animateTransform attributeName="transform" type="translate"
        values="0,2; 0,-3; 0,2; 0,-1; 0,1; 0,2" dur="6s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animateTransform attributeName="transform" type="scale"
        values="1,1; 1.01,1.01; 1,1; 1.005,1.005; 1,1" dur="8s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" additive="sum"/>
    </text>

    <!-- Glitch layers -->
    <text x="447" y="163" text-anchor="middle"
          font-family="'Courier New', monospace" font-weight="900" font-size="76" letter-spacing="14"
          fill="#22d3ee" opacity="0" clip-path="url(#glitchClip1)">
      RUYYNN
      <animate attributeName="opacity" values="0;0.4;0;0.3;0;0.2;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -3,0; 2,0; -1,0; 0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </text>
    <text x="453" y="163" text-anchor="middle"
          font-family="'Courier New', monospace" font-weight="900" font-size="76" letter-spacing="14"
          fill="#8b5cf6" opacity="0" clip-path="url(#glitchClip2)">
      RUYYNN
      <animate attributeName="opacity" values="0;0.3;0;0.2;0;0.25;0" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 3,0; -2,0; 1,0; 0,0" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </text>

    <!-- Glow Bar -->
    <g>
      <rect x="265" y="173" width="370" height="8" rx="4" fill="#22d3ee" opacity="0.15" filter="url(#fluidGlow)">
        <animate attributeName="width" values="350;380;350;370;350" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="x" values="275;260;275;265;275" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="opacity" values="0.1;0.25;0.1;0.2;0.1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </rect>
      <rect x="275" y="175" width="350" height="2" rx="1" fill="url(#barGrad)">
        <animate attributeName="width" values="350;380;350;370;350" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
        <animate attributeName="x" values="275;260;275;265;275" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </rect>
    </g>

    <!-- Top tag -->
    <text x="450" y="72" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="11" letter-spacing="6"
          fill="#22d3ee" opacity="0.5">
      [ RED TEAM · OFFENSIVE SECURITY ]
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </text>

    <!-- Subtitle -->
    <text x="450" y="215" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="12" letter-spacing="4"
          fill="#94a3b8" opacity="0.7">
      Developer  ·  Creator  ·  Learner
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </text>

    <!-- Corner brackets -->
    <g>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <polyline points="12,30 12,12 30,12" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="square"/>
      <polyline points="870,12 888,12 888,30" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="square"/>
      <polyline points="12,250 12,268 30,268" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="square"/>
      <polyline points="870,268 888,268 888,250" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="square"/>
    </g>

    <!-- Data stream lines (left side) -->
    <g opacity="0.15" font-family="'Courier New', monospace" font-size="9" fill="#22d3ee" letter-spacing="1">
      <text x="28" y="100">01101</text>
      <text x="28" y="115">10110</text>
      <text x="28" y="130">11001</text>
      <text x="28" y="145">00111</text>
      <text x="28" y="160">10101</text>
      <text x="28" y="175">01110</text>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2s" repeatCount="indefinite"/>
    </g>
    <!-- Data stream lines (right side) -->
    <g opacity="0.15" font-family="'Courier New', monospace" font-size="9" fill="#8b5cf6" letter-spacing="1" text-anchor="end">
      <text x="872" y="100">10110</text>
      <text x="872" y="115">01101</text>
      <text x="872" y="130">00111</text>
      <text x="872" y="145">11010</text>
      <text x="872" y="160">10011</text>
      <text x="872" y="175">01001</text>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2.5s" repeatCount="indefinite"/>
    </g>

    <!-- Horizontal accent lines -->
    <line x1="45" y1="140" x2="155" y2="140" stroke="#22d3ee" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="745" y1="140" x2="855" y2="140" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.5s" repeatCount="indefinite"/>
    </line>

    <!-- Status dot -->
    <circle cx="450" cy="240" r="2.5" fill="#22d3ee" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
